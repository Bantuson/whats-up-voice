<table width="100%" cellpadding="0" cellspacing="0" style="background:#0A0A0A;min-height:100vh;">
  <tr>
    <td align="center" style="padding:48px 16px;">

      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

        <!-- Header -->
        <tr>
          <td style="padding-bottom:32px;">
            <span style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#444441;">
              VOICEAPP
            </span>
          </td>
        </tr>

        <!-- Card -->
        <tr>
          <td style="background:#111111;border:1px solid #282828;border-radius:5px;padding:40px 36px;">

            <!-- Label -->
            <p style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#444441;margin:0 0 12px;">
              SIGN-IN CODE
            </p>

            <!-- Heading -->
            <h1 style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:#F0F0EE;margin:0 0 24px;line-height:1.3;">
              Your verification code
            </h1>

            <!-- OTP token block -->
            <div style="background:#0A0A0A;border:1px solid #282828;border-left:3px solid #00E87A;border-radius:5px;padding:20px 24px;margin:0 0 28px;">
              <p style="font-family:'Space Mono',monospace;font-size:32px;font-weight:700;letter-spacing:0.18em;color:#00E87A;margin:0;text-align:center;">
                {{ .Token }}
              </p>
            </div>

            <!-- Body copy -->
            <p style="font-family:'Space Grotesk',sans-serif;font-size:14px;color:#F0F0EE;margin:0 0 8px;line-height:1.6;">
              Enter this code in the VoiceApp caregiver dashboard to sign in. It expires in <strong>1 hour</strong>.
            </p>
            <p style="font-family:'Space Grotesk',sans-serif;font-size:14px;color:#F0F0EE;margin:0;line-height:1.6;">
              If you didn't request this, you can safely ignore this email.
            </p>

          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding-top:24px;">
            <p style="font-family:'Space Mono',monospace;font-size:10px;color:#444441;margin:0;letter-spacing:0.06em;">
              Built for South Africa · Voice-first · No screen required
            </p>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>
