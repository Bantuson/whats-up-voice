version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_TOKEN: ${API_BEARER_TOKEN}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_WS_URL: ""        # empty = auto-detect from browser host
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - FRONTEND_ORIGIN=http://localhost:3000
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Optional Redis — only needed for heartbeat worker + cron jobs.
  # Remove this service and the depends_on above if you don't need batch features.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
